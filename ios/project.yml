name: PatchTracker

options:
  bundleIdPrefix: com.prolocity
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: "0.9.19"

targets:
  PatchTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PatchTracker
      # Bundled at build time from the repo-root doc so in-app Help can never drift from it —
      # mirrors the Android app's copyFeaturesDoc Gradle task, which does the same thing by
      # copying the same source file into assets rather than checking in a duplicate.
      - path: ../FEATURES.md
        name: FEATURES.md
        buildPhase: resources
    dependencies:
      - package: ZIPFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.prolocity.patchtracker
        PRODUCT_NAME: PatchTracker
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        # Universal: 1 = iPhone, 2 = iPad
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_VERSION: "5.0"
        INFOPLIST_KEY_CFBundleDisplayName: Patch Tracker
        INFOPLIST_KEY_NSCameraUsageDescription: "Patch Tracker uses the camera to photograph players with the patches they've earned and to capture custom patch artwork."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  PatchTrackerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PatchTrackerTests
    dependencies:
      - target: PatchTracker
    settings:
      base:
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  PatchTracker:
    build:
      targets:
        PatchTracker: [run, test, profile, analyze, archive]
        PatchTrackerTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PatchTrackerTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
