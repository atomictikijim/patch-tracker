workflows:
  debug-build:
    name: Debug Build
    instance_type: linux_x2
    environment:
      vars:
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx3072m -Dorg.gradle.parallel=true -Dorg.gradle.daemon=true"
    scripts:
      - name: Build debug APK
        script: |
          ./gradlew :app:assembleDebug
      - name: Run unit tests
        script: |
          ./gradlew :app:testDebugUnitTest
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
      - app/build/reports/tests/**
    publishing:
      email:
        recipients:
          - atomictikijim@gmail.com

  release-build:
    name: Release Build
    instance_type: linux_x2
    environment:
      vars:
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx3072m -Dorg.gradle.parallel=true -Dorg.gradle.daemon=true"
    scripts:
      - name: Build release APK
        script: |
          if [ ! -z "$KEYSTORE_PATH" ] && [ ! -z "$KEYSTORE_PASSWORD" ] && [ ! -z "$KEY_ALIAS" ] && [ ! -z "$KEY_PASSWORD" ]; then
            echo "storeFile=$KEYSTORE_PATH" > keystore.properties
            echo "storePassword=$KEYSTORE_PASSWORD" >> keystore.properties
            echo "keyAlias=$KEY_ALIAS" >> keystore.properties
            echo "keyPassword=$KEY_PASSWORD" >> keystore.properties
          fi
          ./gradlew :app:assembleRelease
      - name: Run unit tests
        script: |
          ./gradlew :app:testReleaseUnitTest
    artifacts:
      - app/build/outputs/apk/release/app-release.apk
      - app/build/reports/tests/**
    publishing:
      email:
        recipients:
          - atomictikijim@gmail.com

  ios-ci:
    name: iOS CI (Simulator build + tests)
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      xcode: latest
      vars:
        XCODE_PROJECT: "PatchTracker.xcodeproj"
        XCODE_SCHEME: "PatchTracker"
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd ios && xcodegen generate
      - name: Build for iOS Simulator
        script: |
          cd ios
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
      - name: Run unit tests
        script: |
          cd ios
          xcodebuild build-for-testing \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -derivedDataPath DerivedData
          xcodebuild test-without-building \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -derivedDataPath DerivedData
    publishing:
      email:
        recipients:
          - atomictikijim@gmail.com

  native-ios-unsigned:
    name: Native iOS Unsigned Build
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      xcode: latest
      vars:
        XCODE_PROJECT: "PatchTracker.xcodeproj"
        XCODE_SCHEME: "PatchTracker"
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd ios && xcodegen generate
      - name: Build Unsigned Xcode Binary
        script: |
          cd ios
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            BUILD_DIR=$HOME/build
      - name: Package Unsigned Application into IPA
        script: |
          cd $HOME/build/Release-iphoneos
          mkdir -p Payload
          cp -r PatchTracker.app Payload/
          zip -r unsigned_app.ipa Payload
    artifacts:
      - $HOME/build/Release-iphoneos/unsigned_app.ipa
    publishing:
      email:
        recipients:
          - atomictikijim@gmail.com
