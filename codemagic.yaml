workflows:
  debug-build:
    name: Debug Build
    instance_type: linux_x2
    environment:
      vars:
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx3072m -Dorg.gradle.parallel=true -Dorg.gradle.daemon=true"
    triggering:
      events:
        - pull_request
        - push
    scripts:
      - name: Build debug APK
        script: |
          ./gradlew :app:assembleDebug
      - name: Run unit tests
        script: |
          ./gradlew :app:testDebugUnitTest
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
      - app/build/reports/tests/**
    publishing:
      email:
        recipients:
          - james.milne@prolocity.com

  release-build:
    name: Release Build
    instance_type: linux_x2
    environment:
      vars:
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx3072m -Dorg.gradle.parallel=true -Dorg.gradle.daemon=true"
    triggering:
      events:
        - tag
    scripts:
      - name: Build release APK
        script: |
          if [ ! -z "$KEYSTORE_PATH" ] && [ ! -z "$KEYSTORE_PASSWORD" ] && [ ! -z "$KEY_ALIAS" ] && [ ! -z "$KEY_PASSWORD" ]; then
            echo "storeFile=$KEYSTORE_PATH" > keystore.properties
            echo "storePassword=$KEYSTORE_PASSWORD" >> keystore.properties
            echo "keyAlias=$KEY_ALIAS" >> keystore.properties
            echo "keyPassword=$KEY_PASSWORD" >> keystore.properties
          fi
          ./gradlew :app:assembleRelease
      - name: Run unit tests
        script: |
          ./gradlew :app:testReleaseUnitTest
    artifacts:
      - app/build/outputs/apk/release/app-release.apk
      - app/build/reports/tests/**
    publishing:
      email:
        recipients:
          - james.milne@prolocity.com
